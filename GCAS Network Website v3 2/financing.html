<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GCAS Network — Financing Portal</title>
  <meta name="robots" content="noindex, nofollow" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-container {
      max-width: 480px;
      width: 100%;
      background: white;
      border-radius: 32px;
      padding: 48px 40px;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
      text-align: center;
    }

    .login-container h1 {
      font-family: 'Fraunces', serif;
      font-size: 28px;
      margin-bottom: 12px;
      color: #0A2540;
    }

    .login-container .sub {
      color: #5a6e7c;
      margin-bottom: 32px;
      font-size: 15px;
    }

    .input-group {
      text-align: left;
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 8px;
      color: #1e2f3e;
    }

    .input-group input {
      width: 100%;
      padding: 14px 16px;
      font-size: 16px;
      border: 1px solid #cbd5e1;
      border-radius: 16px;
      outline: none;
      transition: all 0.2s;
    }

    .input-group input:focus {
      border-color: #0A2540;
      box-shadow: 0 0 0 3px rgba(10,37,64,0.1);
    }

    button {
      width: 100%;
      background: #0A2540;
      color: white;
      border: none;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 40px;
      cursor: pointer;
      margin-top: 12px;
      transition: background 0.2s;
    }

    button:hover {
      background: #1a3a5c;
    }

    .error {
      background: #fee2e2;
      color: #b91c1c;
      padding: 12px;
      border-radius: 16px;
      font-size: 14px;
      margin-top: 20px;
    }

    .success-content {
      text-align: center;
    }

    .success-content h2 {
      font-family: 'Fraunces', serif;
      font-size: 28px;
      margin-bottom: 16px;
      color: #0A2540;
    }

    .success-content p {
      color: #334155;
      margin-bottom: 24px;
    }

    .start-button {
      display: inline-block;
      background: #0A2540;
      color: white;
      padding: 14px 32px;
      border-radius: 40px;
      text-decoration: none;
      font-weight: 600;
      margin-top: 16px;
      transition: background 0.2s;
    }

    .start-button:hover {
      background: #1a3a5c;
    }

    .back-link {
      display: inline-block;
      margin-top: 24px;
      color: #5a6e7c;
      text-decoration: none;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="login-container" id="app">
  <!-- Login form will appear here, or the protected content -->
</div>

<script>
  // ============================================
  // 🔐 SET YOUR USERNAME AND PASSWORD HERE:
  // ============================================
  const VALID_USERNAME = "gcasclient";
  const VALID_PASSWORD = "GCAS2026";
  // ============================================

  function checkAuth() {
    const auth = sessionStorage.getItem('gcas_financing_auth');
    if (auth === 'true') {
      showProtectedContent();
    } else {
      showLoginForm();
    }
  }

  function showLoginForm() {
    document.getElementById('app').innerHTML = `
      <h1>Financing Portal</h1>
      <div class="sub">Authorized access only</div>
      <form id="loginForm">
        <div class="input-group">
          <label>Username</label>
          <input type="text" id="username" autocomplete="off" />
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" id="password" />
        </div>
        <button type="submit">Sign In →</button>
      </form>
      <div id="errorMsg"></div>
    `;

    const form = document.getElementById('loginForm');
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      if (username === VALID_USERNAME && password === VALID_PASSWORD) {
        sessionStorage.setItem('gcas_financing_auth', 'true');
        showProtectedContent();
      } else {
        const errorDiv = document.getElementById('errorMsg');
        errorDiv.innerHTML = '<div class="error">Invalid username or password. Access denied.</div>';
      }
    });
  }

  function showProtectedContent() {
    document.getElementById('app').innerHTML = `
      <div class="success-content">
        <h2>Financing Options</h2>
        <p>You have been granted access to our financing partner.<br/>Click below to proceed.</p>
        <a href="https://flexxbuy.com/gcas-llc" target="_blank" class="start-button">Start here →</a>
        <br/>
        <a href="services-fees.html" class="back-link">← Back to Services & Fees</a>
      </div>
    `;
  }

  checkAuth();
</script>

</body>
</html>
